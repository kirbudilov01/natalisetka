name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          timeout: 600s
          script: |
            set -e
            git config --global --add safe.directory /opt/natalisetka/ai-content-app
            cd /opt/natalisetka/ai-content-app

            # Pull latest code (reset hard to avoid merge conflicts)
            git fetch origin main
            git reset --hard origin/main

            # Rebuild and restart changed services
            docker compose -f docker-compose.yml -f docker-compose.prod.yml build --no-cache backend frontend telegram-bot
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d backend frontend telegram-bot worker

            # Show status
            docker compose ps
            echo "Deploy complete $(date)"
